services:
  - type: web
    name: pi-3-semestre
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: oregon
    healthCheckPath: /
    port: 8080
    envVars:
      - key: APP_NAME
        value: "PI-3-Semestre"
      - key: APP_ENV
        value: "production"
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_LOCALE
        value: "pt_BR"
      - key: APP_FALLBACK_LOCALE
        value: "pt_BR"
      - key: DB_CONNECTION
        value: "pgsql"
      - key: DB_HOST
        sync: false
        value: "aws-0-us-east-1.pooler.supabase.com"
      - key: DB_PORT
        value: "6543"
      - key: DB_DATABASE
        value: "postgres"
      - key: DB_USERNAME
        sync: false
        value: "postgres.seu-projeto"
      - key: DB_PASSWORD
        sync: false
        value: "sua-senha-do-supabase"
      - key: DB_SSLMODE
        value: "require"
      - key: APP_URL
        value: "https://${RENDER_EXTERNAL_HOSTNAME}"
      - key: LOG_CHANNEL
        value: "stack"
      - key: LOG_LEVEL
        value: "info"
      - key: CACHE_DRIVER
        value: "file"
      - key: QUEUE_CONNECTION
        value: "sync"
      - key: SESSION_DRIVER
        value: "file"
